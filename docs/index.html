<script>
  // --------------------
  // Tabs (with ARIA)
  // --------------------
  const tabButtons = document.querySelectorAll(".tab-btn");
  const panels = {
    schemas: document.getElementById("tab-schemas"),
    dcc: document.getElementById("tab-dcc")
  };

  // ARIA setup
  const tabsEl = document.querySelector(".tabs");
  tabsEl.setAttribute("role", "tablist");

  tabButtons.forEach(btn => {
    btn.setAttribute("role", "tab");
    btn.setAttribute("aria-selected", btn.classList.contains("active") ? "true" : "false");
    btn.setAttribute("tabindex", btn.classList.contains("active") ? "0" : "-1");
    btn.setAttribute("aria-controls", `tab-${btn.dataset.tab}`);
  });

  function activateTab(tabName) {
    tabButtons.forEach(b => {
      const isActive = b.dataset.tab === tabName;
      b.classList.toggle("active", isActive);
      b.setAttribute("aria-selected", isActive ? "true" : "false");
      b.setAttribute("tabindex", isActive ? "0" : "-1");
    });

    Object.entries(panels).forEach(([name, panel]) => {
      panel.classList.toggle("active", name === tabName);
    });
  }

  tabButtons.forEach(btn => {
    btn.addEventListener("click", () => activateTab(btn.dataset.tab));
  });

  // --------------------
  // Helpers
  // --------------------
  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function setBadge(text) {
    document.getElementById("rowCountBadge").textContent = text;
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function formatSha(sha) {
    if (!sha) return "";
    const s = String(sha);
    if (s.length <= 14) return s;
    return `${s.slice(0, 12)}…`;
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      return false;
    }
  }

  function parseDateToEpoch(value) {
    if (!value) return 0;

    // Works well for ISO strings.
    const t = Date.parse(value);
    if (!Number.isNaN(t)) return Math.floor(t / 1000);

    // Fallback: return 0 so it sorts last
    return 0;
  }

  // --------------------
  // Filter row injection
  // --------------------
  function addFilterRow(hiddenByDefault = true) {
    const thead = document.querySelector("#orgTable thead");
    const headerCells = thead.querySelectorAll("tr:first-child th");

    const filterRow = document.createElement("tr");
    filterRow.className = "filtersRow";
    if (hiddenByDefault) filterRow.classList.add("hidden");

    headerCells.forEach((th, idx) => {
      const filterTh = document.createElement("th");

      // Filterable columns
      const filterableColumns = new Set([0, 1, 2, 3, 5, 6, 7, 8]);

      if (filterableColumns.has(idx)) {
        filterTh.innerHTML = `
          <select class="colFilter" data-col="${idx}">
            <option value="">All</option>
          </select>
        `;
      } else {
        filterTh.innerHTML = `<span class="muted">—</span>`;
      }

      filterRow.appendChild(filterTh);
    });

    thead.appendChild(filterRow);
  }

  // --------------------
  // Filters toggle
  // --------------------
  function setupFiltersToggle() {
    const btn = document.getElementById("filtersToggle");

    btn.setAttribute("aria-expanded", "false");

    btn.addEventListener("click", () => {
      const row = document.querySelector("#orgTable thead tr.filtersRow");
      if (!row) return;

      const isHidden = row.classList.contains("hidden");

      row.classList.toggle("hidden", !isHidden);
      btn.classList.toggle("open", isHidden);
      btn.setAttribute("aria-expanded", isHidden ? "true" : "false");
    });
  }

  // --------------------
  // Main: Load + init DataTables
  // --------------------
  async function loadSchemaTable() {
    setBadge("Loading…");

    let data;
    try {
      const resp = await fetch("./data.json", { cache: "no-store" });

      if (!resp.ok) {
        setBadge("data.json missing");
        showTableError(
          "Could not load <code>docs/data.json</code>.",
          "Did you run <code>export_orgs.py</code> and commit the output?"
        );
        return;
      }

      data = await resp.json();
    } catch (err) {
      setBadge("Load failed");
      showTableError(
        "Failed to load <code>docs/data.json</code>.",
        "This may be a network issue, a bad relative path, or GitHub Pages caching."
      );
      return;
    }

    setBadge(`${data.length.toLocaleString()} rows loaded`);

    // Add filter row before DataTables init
    addFilterRow(true);
    setupFiltersToggle();

    // Wrap table for mobile horizontal scroll
    const tableEl = document.getElementById("orgTable");
    const wrapper = document.createElement("div");
    wrapper.style.overflowX = "auto";
    wrapper.style.width = "100%";
    tableEl.parentNode.insertBefore(wrapper, tableEl);
    wrapper.appendChild(tableEl);

    // DataTables: use JSON directly
    const table = $("#orgTable").DataTable({
      data,
      pageLength: 25,
      order: [[7, "desc"]],
      dom: "lfrtip",
      columns: [
        { data: "organization_id" },
        { data: "organization_name" },
        { data: "schema_id" },
        { data: "schema_name" },
        {
          data: null,
          orderable: false,
          render: function (row) {
            // BEST: prefer schema_url from JSON
            const schemaUrl = row.schema_url
              ? row.schema_url
              : (
                `https://repo-prod.prod.sagebase.org/repo/v1/schema/type/registered/` +
                `${row.organization_name}-${row.schema_name}`
              );

            return `
              <a class="pillLink"
                 href="${escapeHtml(schemaUrl)}"
                 target="_blank"
                 rel="noopener noreferrer">
                Open Schema ↗
              </a>
            `;
          }
        },
        { data: "version_id" },
        { data: "semantic_version" },
        {
          data: "created_on",
          render: function (value, type) {
            const epoch = parseDateToEpoch(value);

            // For sorting, return epoch
            if (type === "sort") return epoch;

            // For display
            return escapeHtml(value);
          }
        },
        { data: "created_by" },
        {
          data: "json_sha256_hex",
          render: function (value, type) {
            const full = value ? String(value) : "";
            const short = formatSha(full);

            if (!full) return "";

            // For sorting/filtering, keep full
            if (type === "sort" || type === "filter") return full;

            const safeFull = escapeHtml(full);

            return `
              <span class="mono" title="${safeFull}">${escapeHtml(short)}</span>
              <button class="btn"
                      style="padding:6px 10px; margin-left:8px; border-radius:10px; font-size:12px;"
                      data-copy="${safeFull}"
                      type="button">
                Copy
              </button>
            `;
          }
        }
      ]
    });

    // Badge updates whenever table redraws
    table.on("draw", function () {
      const visible = table.rows({ filter: "applied" }).count();
      setBadge(`${visible.toLocaleString()} rows shown`);
    });

    // Copy button handler (event delegation)
    document.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-copy]");
      if (!btn) return;

      const text = btn.getAttribute("data-copy");
      const ok = await copyText(text);

      const original = btn.textContent;
      btn.textContent = ok ? "Copied ✓" : "Copy failed";
      setTimeout(() => (btn.textContent = original), 900);
    });

    // --------------------
    // Per-column dropdown filters (exact match)
    // --------------------
    const filterableColumns = [0, 1, 2, 3, 5, 6, 7, 8];

    for (const colIdx of filterableColumns) {
      const selectEl = document.querySelector(`.colFilter[data-col="${colIdx}"]`);
      if (!selectEl) continue;

      const valuesSet = new Set();

      table.column(colIdx).data().each(function (value) {
        const v = value === null || value === undefined ? "" : String(value).trim();
        if (v) valuesSet.add(v);
      });

      const values = Array.from(valuesSet).sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" })
      );

      // Prevent unusable dropdowns
      const MAX_OPTIONS = 300;
      if (values.length > MAX_OPTIONS) {
        selectEl.innerHTML = `<option value="">Too many values (${values.length})</option>`;
        selectEl.disabled = true;
        continue;
      }

      for (const v of values) {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      }

      // Exact match via anchored regex
      selectEl.addEventListener("change", function () {
        const val = this.value;

        if (!val) {
          table.column(colIdx).search("").draw();
          return;
        }

        const escaped = escapeRegex(val);
        table.column(colIdx).search(`^${escaped}$`, true, false).draw();
      });
    }

    // --------------------
    // Clear Filters button
    // --------------------
    document.getElementById("clearFilters").addEventListener("click", () => {
      table.search("");
      table.columns().search("");

      document.querySelectorAll(".colFilter").forEach(sel => {
        sel.value = "";
      });

      table.draw();
    });
  }

  // --------------------
  // Error UI
  // --------------------
  function showTableError(titleHtml, detailHtml) {
    const body = document.querySelector("#tab-schemas .panelBody");
    const existing = body.querySelector(".errorBox");
    if (existing) existing.remove();

    const box = document.createElement("div");
    box.className = "errorBox";
    box.style.border = "1px solid rgba(255,255,255,0.08)";
    box.style.borderRadius = "14px";
    box.style.padding = "14px 14px";
    box.style.background = "rgba(255,255,255,0.02)";
    box.style.marginTop = "12px";
    box.innerHTML = `
      <div style="font-weight:750; margin-bottom:6px;">${titleHtml}</div>
      <div style="color: rgba(244,242,236,0.62); font-size: 13px; line-height: 1.5;">
        ${detailHtml}
      </div>
    `;

    body.prepend(box);
  }

  loadSchemaTable();
</script>
