# .github/workflows/update-data.yml
#
# Runs the Synapse export script daily, commits the updated data.json,
# and deploys the docs/ folder to GitHub Pages.

name: Update Schema Data & Deploy

on:
  # ─── Scheduled: every day at 6:00 AM UTC ───
  schedule:
    - cron: "0 6 * * *"

  # ─── Manual trigger from the Actions tab ───
  workflow_dispatch:

  # ─── Also run on pushes to main (so Pages deploys on code changes too) ───
  push:
    branches: [main]

# Required for GitHub Pages deployment via actions
permissions:
  contents: write        # needed to push the data.json commit
  pages: write           # needed to deploy to GitHub Pages
  id-token: write        # needed for Pages OIDC auth

# Prevent overlapping runs
concurrency:
  group: "update-and-deploy"
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════
  # Job 1: Run the Python script, commit changes
  # ════════════════════════════════════════════
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install synapseclient

      - name: Run export script
        env:
          # synapseclient reads this env var automatically for auth
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
        run: |
          python docs/export_orgs.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "chore: update schema data [automated]"
          git push

  # ════════════════════════════════════════════
  # Job 2: Deploy docs/ to GitHub Pages
  # ════════════════════════════════════════════
  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest

    # Only deploy from main branch
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the latest commit (including the one we just pushed)
          ref: main

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4