
# Runs the Synapse export script, commits updated schema data,
# deploys docs/ to GitHub Pages, then publishes schemas to CoreModels.

name: Update Schema Data → Deploy Docs → Publish to CoreModels

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      org_name:
        description: "Optional organization_name filter (e.g. ADA.PSI). Leave blank to import all."
        required: false
        default: ""

  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy-main
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════
  # Job 1: Update docs/data.json
  # ════════════════════════════════════════════
  update-data:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.diff.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with latest main
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install synapseclient requests

      - name: Run Synapse export
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          ORG_NAME_FILTER: ${{ github.event.inputs.org_name || '' }}
          SKIP_TEST_SCHEMAS: "true"
          MAX_WORKERS: "4"
        run: |
          python docs/export_orgs.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/data.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git pull --rebase --autostash origin main

          git add docs/data.json

          if git diff --cached --quiet; then
            echo "No changes to commit after syncing with main"
            exit 0
          fi

          git commit -m "chore: update schema data [automated] [skip ci]"
          git push origin HEAD:main

  # ════════════════════════════════════════════
  # Job 2: Check schema URIs against staging
  # ════════════════════════════════════════════
  check-staging:
    needs: update-data
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with latest main
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "synapseclient==4.12.0" python-dotenv

      - name: Check schema URIs against staging
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          STAGING_FOLDER_ID: ${{ secrets.STAGING_FOLDER_ID }}
          ASSIGNEE_PRINCIPAL_ID: ${{ secrets.ASSIGNEE_PRINCIPAL_ID }}
          CHECK_TASK_CREATION: "true"
          MAX_WORKERS: "4"
        run: |
          python docs/check_schema_uris_staging.py

      - name: Commit and push staging check results
        run: |
          git pull --rebase --autostash origin main

          git add docs/staging_checks.json

          if git diff --cached --quiet; then
            echo "No changes to staging_checks.json"
            exit 0
          fi

          git commit -m "chore: update staging validation results [automated] [skip ci]"
          git push origin HEAD:main

  # ════════════════════════════════════════════
  # Job 3: Build React app + Deploy to GitHub Pages
  # ════════════════════════════════════════════
  deploy-pages:
    needs: [update-data, check-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || needs.update-data.outputs.data_changed == 'true')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        # Vite uses publicDir: 'docs', so data.json & staging_checks.json
        # are automatically copied into dist/ alongside the React bundle.

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ════════════════════════════════════════════
  # Job 4: Publish schemas to CoreModels
  # ════════════════════════════════════════════
  publish-coremodels:
    needs: deploy-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Import schemas to CoreModels
        env:
          COREMODELS_API_URL: ${{ secrets.COREMODELS_API_URL }}
          COREMODELS_API_TOKEN: ${{ secrets.COREMODELS_API_TOKEN }}
          COREMODELS_PROJECT_ID: ${{ secrets.COREMODELS_PROJECT_ID }}
          COREMODELS_SPACE_ID: ${{ secrets.COREMODELS_SPACE_ID }}
          COREMODELS_CONFIG_TYPE_ID: ${{ secrets.COREMODELS_CONFIG_TYPE_ID }}

          ORG_NAME_FILTER: ${{ github.event.inputs.org_name || '' }}

          # Speed controls
          MAX_WORKERS: "1"
          RATE_LIMIT_SECONDS: "0.0"
          VERIFY_URLS: "false"

        run: |
          python docs/import_to_coremodels.py

          