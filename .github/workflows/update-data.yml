# Runs the Synapse export script, publishes schemas to CoreModels,
# commits updated schema data, and deploys docs/ to GitHub Pages.

name: Update Schema Data, Publish to CoreModels & Deploy

on:
  # ─── Scheduled: every day at 6:00 AM UTC ───
  schedule:
    - cron: "0 6 * * *"

  # ─── Manual trigger from the Actions tab ───
  workflow_dispatch:

  # ─── Also run on pushes to main ───
  push:
    branches: [main]

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping runs
concurrency:
  group: update-and-deploy
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════
  # Job 1: Update data + publish to CoreModels
  # ════════════════════════════════════════════
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install synapseclient requests

      # ─── Export schema / org data from Synapse ───
      - name: Run Synapse export
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
        run: |
          python docs/export_orgs.py

      # ─── Publish schemas to CoreModels ───
      - name: Import schemas to CoreModels
        env:
          COREMODELS_API_URL: ${{ secrets.COREMODELS_API_URL }}
          COREMODELS_API_TOKEN: ${{ secrets.COREMODELS_API_TOKEN }}
          COREMODELS_PROJECT_ID: ${{ secrets.COREMODELS_PROJECT_ID }}
          COREMODELS_SPACE_ID: ${{ secrets.COREMODELS_SPACE_ID }}
          COREMODELS_CONFIG_TYPE_ID: ${{ secrets.COREMODELS_CONFIG_TYPE_ID }}
        run: |
          python docs/import_to_coremodels.py

      # ─── Check if export produced changes ───
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/data.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      # ─── Commit updated data if needed ───
      - name: Commit and push updated data.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "chore: update schema data [automated]"
          git push

  # ════════════════════════════════════════════
  # Job 2: Deploy docs/ to GitHub Pages
  # ════════════════════════════════════════════
  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest

    # Only deploy from main
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
