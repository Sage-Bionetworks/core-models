
# Runs the Synapse export script, opens a PR with updated schema data,
# deploys docs/ to GitHub Pages (from main), then publishes schemas to CoreModels.
#
# Branch protection on `main` forbids direct pushes, so automated changes to
# docs/data.json and docs/staging_checks.json are collected onto a single
# run-scoped branch and submitted as one pull request for review/merge.

name: Update Schema Data → Deploy Docs → Publish to CoreModels

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      org_name:
        description: "Optional organization_name filter (e.g. ADA.PSI). Leave blank to import all."
        required: false
        default: ""

  push:
    branches: [main]

# Least-privilege default; individual jobs widen this as needed.
permissions:
  contents: read

concurrency:
  group: update-and-deploy-main
  cancel-in-progress: true

env:
  # Single branch shared by the data + staging jobs, unique per run.
  UPDATE_BRANCH: automated/schema-update-${{ github.run_id }}

jobs:
  # ════════════════════════════════════════════
  # Job 1: Update docs/data.json (onto the PR branch)
  # ════════════════════════════════════════════
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push commits to the run-scoped PR branch
    outputs:
      data_changed: ${{ steps.diff.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install synapseclient requests

      - name: Run Synapse export
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          ORG_NAME_FILTER: ${{ github.event.inputs.org_name || '' }}
          SKIP_TEST_SCHEMAS: "true"
          MAX_WORKERS: "4"
        run: |
          python docs/export_orgs.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/data.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data.json to PR branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git checkout -b "$UPDATE_BRANCH"
          git add docs/data.json
          git commit -m "chore: update schema data [automated]"
          git push origin "$UPDATE_BRANCH"

  # ════════════════════════════════════════════
  # Job 2: Check schema URIs against staging (onto the PR branch)
  # ════════════════════════════════════════════
  check-staging:
    needs: update-data
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write  # push staging check results to the run-scoped PR branch
    outputs:
      staging_changed: ${{ steps.stage_commit.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "synapseclient==4.12.0" python-dotenv

      - name: Check schema URIs against staging
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          STAGING_FOLDER_ID: ${{ secrets.STAGING_FOLDER_ID }}
          ASSIGNEE_PRINCIPAL_ID: ${{ secrets.ASSIGNEE_PRINCIPAL_ID }}
          CHECK_TASK_CREATION: "true"
          MAX_WORKERS: "4"
        run: |
          python docs/check_schema_uris_staging.py

      - name: Commit staging check results to PR branch
        id: stage_commit
        run: |
          # Reuse the branch if update-data already created it, else start it from main.
          git fetch origin "$UPDATE_BRANCH" 2>/dev/null || true
          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" >/dev/null 2>&1; then
            git checkout -B "$UPDATE_BRANCH" "origin/$UPDATE_BRANCH"
          else
            git checkout -b "$UPDATE_BRANCH"
          fi

          git add docs/staging_checks.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to staging_checks.json"
            exit 0
          fi

          git commit -m "chore: update staging validation results [automated]"
          git push origin "$UPDATE_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════
  # Job 3: Open a pull request for the collected changes
  # ════════════════════════════════════════════
  open-pr:
    needs: [update-data, check-staging]
    runs-on: ubuntu-latest
    permissions:
      contents: read         # checkout + ls-remote
      pull-requests: write   # gh pr create
    if: needs.update-data.outputs.data_changed == 'true' || needs.check-staging.outputs.staging_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The branch only exists if at least one file actually changed.
          if ! git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" >/dev/null 2>&1; then
            echo "Branch $UPDATE_BRANCH was not pushed; nothing to open a PR for."
            exit 0
          fi

          existing=$(gh pr list --head "$UPDATE_BRANCH" --state open --json number --jq 'length')
          if [ "$existing" != "0" ]; then
            echo "A PR already exists for $UPDATE_BRANCH."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$UPDATE_BRANCH" \
            --title "chore: automated schema data update" \
            --body "$(cat <<'BODY'
          Automated update of `docs/data.json` and/or `docs/staging_checks.json` from the scheduled Synapse export.

          Merging this PR into `main` will trigger the GitHub Pages deploy and the CoreModels publish.
          BODY
          )"

  # ════════════════════════════════════════════
  # Job 4: Build React app + Deploy to GitHub Pages (from main only)
  # ════════════════════════════════════════════
  deploy-pages:
    needs: [update-data, check-staging]
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      pages: write     # deploy to GitHub Pages
      id-token: write  # OIDC token for deploy-pages
    # Deploy only from main (e.g. when the automated PR is merged, or on a
    # direct push to main) so Pages never publishes unmerged data.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        # Vite uses publicDir: 'docs', so data.json & staging_checks.json
        # are automatically copied into dist/ alongside the React bundle.

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ════════════════════════════════════════════
  # Job 5: Publish schemas to CoreModels
  # ════════════════════════════════════════════
  publish-coremodels:
    needs: deploy-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout only; publishes via external CoreModels API

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Import schemas to CoreModels
        env:
          COREMODELS_API_URL: ${{ secrets.COREMODELS_API_URL }}
          COREMODELS_API_TOKEN: ${{ secrets.COREMODELS_API_TOKEN }}
          COREMODELS_PROJECT_ID: ${{ secrets.COREMODELS_PROJECT_ID }}
          COREMODELS_SPACE_ID: ${{ secrets.COREMODELS_SPACE_ID }}
          COREMODELS_CONFIG_TYPE_ID: ${{ secrets.COREMODELS_CONFIG_TYPE_ID }}

          ORG_NAME_FILTER: ${{ github.event.inputs.org_name || '' }}

          # Speed controls
          MAX_WORKERS: "1"
          RATE_LIMIT_SECONDS: "0.0"
          VERIFY_URLS: "false"
          BATCH_SIZE: "10"

        run: |
          python docs/import_to_coremodels.py
