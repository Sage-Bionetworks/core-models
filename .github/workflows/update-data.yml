# Runs the Synapse export script, commits updated schema data,
# deploys docs/ to GitHub Pages, then publishes schemas to CoreModels.

name: Update Schema Data → Deploy Docs → Publish to CoreModels

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      org_name:
        description: "Optional organization_name filter (e.g. ADA.PSI). Leave blank to import all."
        required: false
        default: ""

  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════
  # Job 1: Update docs/data.json
  # ════════════════════════════════════════════
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install synapseclient requests

      - name: Run Synapse export
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          ORG_NAME_FILTER: ${{ github.event.inputs.org_name }}
          SKIP_TEST_SCHEMAS: "true"
          MAX_WORKERS: "4"
        run: |
          python docs/export_orgs.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/data.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "chore: update schema data [automated]"
          git push

  # ════════════════════════════════════════════
  # Job 2: Deploy docs/ to GitHub Pages
  # ════════════════════════════════════════════
  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ════════════════════════════════════════════
  # Job 3: Publish schemas to CoreModels (parallel)
  # ════════════════════════════════════════════
  publish-coremodels:
    needs: deploy-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Import schemas to CoreModels (parallel)
        env:
          COREMODELS_API_URL: ${{ secrets.COREMODELS_API_URL }}
          COREMODELS_API_TOKEN: ${{ secrets.COREMODELS_API_TOKEN }}
          COREMODELS_PROJECT_ID: ${{ secrets.COREMODELS_PROJECT_ID }}
          COREMODELS_SPACE_ID: ${{ secrets.COREMODELS_SPACE_ID }}
          COREMODELS_CONFIG_TYPE_ID: ${{ secrets.COREMODELS_CONFIG_TYPE_ID }}

          ORG_NAME_FILTER: ${{ github.event.inputs.org_name }}

          # Speed controls
          MAX_WORKERS: "1"
          RATE_LIMIT_SECONDS: "0.0"
          VERIFY_URLS: "false"

        run: |
          python docs/import_to_coremodels.py